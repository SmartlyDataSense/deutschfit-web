name: CI

on:
  pull_request:
  push:
    branches: [main, dev, preprod]

permissions:
  contents: read

jobs:
  lint-typecheck-test-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm run test:run

      # `next build` is the same command developers run locally via
      # `npm run preflight`. Build env is set with placeholders so the
      # build doesn't hit external services — Supabase/Resend wiring is
      # exercised at runtime, not build time.
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          NEXT_PUBLIC_SITE_URL: https://example.com
          # Operator payment handles — empty in CI; pages render
          # "Coming soon" placeholders for unset channels.
          NEXT_PUBLIC_PAY_MOMO_NUMBER: ""
          NEXT_PUBLIC_PAY_OM_NUMBER: ""
          NEXT_PUBLIC_PAY_BANK_DETAILS: ""
          NEXT_PUBLIC_PAY_PAYPAL_HANDLE: ""
          NEXT_PUBLIC_PAY_WISE_HANDLE: ""
          NEXT_PUBLIC_PAY_EMAIL: support@deutschfit.app
